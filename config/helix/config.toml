# https://docs.helix-editor.com/configuration.html

# theme = "default"
theme = "mine"

[editor]
bufferline = "multiple" # Show bufferline tabs
undercurl = true
smart-tab = {enable = false} # Disable smart tab
color-modes = true
true-color = true

[editor.soft-wrap] # Soft-wrapped lines, my beloved
enable = true

[editor.indent-guides] # The nice little indent lines
render = true
character = "┊"


[editor.inline-diagnostics] # Funky inline diagnostics
cursor-line = "hint"
other-lines = "error"
prefix-len = 4

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.lsp]
auto-signature-help = true  # Pops up the docs when entering arguments into a function call
display-messages = true     # Displays LSP config & log messages
display-inlay-hints = false

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator", "version-control"]
center = ["read-only-indicator"]
right = ["diagnostics", "position", "position-percentage", "file-encoding"]


#
# KEY REBINDS
#
# https://docs.helix-editor.com/keymap.html
# https://docs.helix-editor.com/master/remapping.html

[keys.insert]
C-s = ":w"                         # Ctrl-S     Save
C-left = "goto_previous_buffer"    # Ctrl-left  prev_buffer
C-right = "goto_next_buffer"       # Ctrl-right next_buffer
A-h = "signature_help"
C-z = "undo"                       # Ctrl-z     Undo

[keys.normal]
C-s = ":w"                         # Ctrl-S     Save
C-o = "file_picker"                # Ctrl-O     Open another file
C-left = "goto_previous_buffer"    # Ctrl-left  prev_buffer
C-right = "goto_next_buffer"       # Ctrl-right next_buffer
S-w = ":buffer-close"              # Shift-W    Close Buffer
r = "redo"                         # R          redo
# Space K does this
S-k = "hover"                      # Shift-K    LSP Hover
S-h = "signature_help"
C-r = [":reload-all", ":sh printf 'Reloaded'"]
g = {f = ["goto_file", ":redraw"], x = ["goto_file", ":redraw"]}

space.t.s = ":tree-sitter-scopes"
space.t.h = ":tree-sitter-highlight-name"
space.t.t = ":tree-sitter-subtree"

[keys.normal.space.i]

# Today's date
d = ':insert-output date +"%%Y-%%m-%%d"'
# Markdown frontmatter
f = ":insert-output echo '---'; echo 'tags: []'; echo \"created: \\\"$(date +'%%Y-%%m-%%d')\\\"\"; echo 'name: \"\"' ; echo '# References:' ; echo '---'; echo ''"
r = [":sh bun run ~/Code/playground/markdown_notes/index.ts \"%{buffer_name}\"", ":reload"]
# Saving a tab
s = [":sh echo \"%{buffer_name}\" >> .helix/tabs.txt", ":buffer-close"]
# Insert a link
l = "@miWms[<right>i("


# *********************************
# Executing things (in normal mode)
# *********************************
[keys.normal.space.x]

# Opening the selection in a wikipedia search
w = ":sh xdg-open \"https://wikipedia.org/w/index.php?search=%{selection}\""
# Prettify the current file
f = [":update", ":sh bunx prettier %{buffer_name} --write", ":reload"]

# Git commit current file
# TODO: If commit unsuccessful - undo git add
# TODO: If current file doesn't actually have changes, do nothing
g = ":sh tmux display-popup -xC -yC -w90%% -h90%% -d \"$PWD\" -E \"git add %{buffer_name} && git commit %{buffer_name}\""


[keys.select]
# Surround selected text!
"("  = "@ms("  # With ()
"["  = "@ms["  # With []
"{"  = "@ms{"  # With {}
"\"" = "@ms\"" # With ""
"'"  = "@ms'"  # With ''

# *********************************
# Executing things (in select mode)
# *********************************
[keys.select.space.x]

# Sorting the selection
s = ":pipe sort"
# Opening the selection in a wikipedia search
w = ":sh xdg-open \"https://wikipedia.org/w/index.php?search=%{selection}\""

